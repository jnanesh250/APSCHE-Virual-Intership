<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('home') }}">Credit Card Predictor</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('home') }}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="{{ url_for('predict') }}">Predict</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card shadow-lg border-0 rounded-4 p-4">
                    <h2 class="fw-bold mb-3 text-center">Applicant Prediction Form</h2>
                    <p class="text-muted text-center mb-4">Enter the applicant details below to receive a prediction.
                    </p>

                    <form method="post" action="{{ url_for('predict') }}">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label">Gender</label>
                                <select class="form-select" name="gender" required>
                                    <option value="">Select</option>
                                    <option>Male</option>
                                    <option>Female</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Own Car</label>
                                <select class="form-select" name="own_car" required>
                                    <option value="">Select</option>
                                    <option>Yes</option>
                                    <option>No</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Own Real Estate</label>
                                <select class="form-select" name="own_real_estate" required>
                                    <option value="">Select</option>
                                    <option>Yes</option>
                                    <option>No</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Type of Income</label>
                                <select class="form-select" name="income_type" required>
                                    <option value="">Select</option>
                                    <option>Working</option>
                                    <option>Commercial associate</option>
                                    <option>Pensioner</option>
                                    <option>State servant</option>
                                    <option>Student</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Education</label>
                                <select class="form-select" name="education" required>
                                    <option value="">Select</option>
                                    <option>Secondary / secondary special</option>
                                    <option>Higher education</option>
                                    <option>Incomplete higher</option>
                                    <option>Lower secondary</option>
                                    <option>Academic degree</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Family Status</label>
                                <select class="form-select" name="family_status" required>
                                    <option value="">Select</option>
                                    <option>Single / not married</option>
                                    <option>Married</option>
                                    <option>Civil marriage</option>
                                    <option>Separated</option>
                                    <option>Widow</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Housing Type</label>
                                <select class="form-select" name="housing_type" required>
                                    <option value="">Select</option>
                                    <option>House / apartment</option>
                                    <option>Rented apartment</option>
                                    <option>Municipal apartment</option>
                                    <option>With parents</option>
                                    <option>Co-op apartment</option>
                                    <option>Office apartment</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Total Annual Income</label>
                                <input type="number" class="form-control" name="annual_income" step="0.01" min="0"
                                    required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Days Birth</label>
                                <input type="number" class="form-control" name="days_birth" step="1" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Days Employed</label>
                                <input type="number" class="form-control" name="days_employed" step="1" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Family Members</label>
                                <input type="number" class="form-control" name="family_members" step="1" min="1"
                                    required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">EMI Paid Off</label>
                                <input type="number" class="form-control" name="emi_paid_off" step="0.01" min="0"
                                    required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">EMI of Past Dues</label>
                                <input type="number" class="form-control" name="emi_past_dues" step="0.01" min="0"
                                    required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Number of Loans</label>
                                <input type="number" class="form-control" name="number_of_loans" step="1" min="0"
                                    required>
                            </div>
                        </div>

                        <div class="text-center mt-4">
                            <button type="submit" class="btn btn-primary btn-lg px-5">Predict</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
